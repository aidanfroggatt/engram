version: v1
plugins:
  # Generate Go base structs and ConnectRPC HTTP Handlers
  - plugin: go
    out: apps/api
    opt: module=engram/api
  - plugin: connect-go
    out: apps/api
    opt: module=engram/api

  # Generate TypeScript base types and ConnectRPC client hooks
  - plugin: es
    out: packages/proto
    opt: target=ts
  - plugin: connect-es
    out: packages/proto
    opt: target=ts
