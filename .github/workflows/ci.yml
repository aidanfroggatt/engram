name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "apps/api/go.mod"
          cache: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: 🧹 Verify Formatting
        run: pnpm turbo format --affected

      - name: ⬢ Lint Codebase
        run: pnpm turbo lint --affected

      - name: 🔠 Static Type Check
        run: pnpm turbo check-types --affected

      - name: 🏗️ Verify Build Stability
        run: pnpm turbo build --affected

      - name: 🧪 Execute Unit Tests
        run: pnpm turbo test --affected
