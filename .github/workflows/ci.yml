name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  FILTER: ${{ github.event_name == 'pull_request' && format('--filter=[...origin/{0}]', github.base_ref) || '' }}

jobs:
  verify:
    name: Quality & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "apps/api/go.mod"
          cache: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: Lint
        run: pnpm turbo lint ${{ env.FILTER }}

      - name: Typecheck
        run: pnpm turbo check-types ${{ env.FILTER }}

      - name: Format
        run: pnpm turbo format ${{ env.FILTER }}

      - name: Build
        run: pnpm turbo build ${{ env.FILTER }}

      - name: Test (Go)
        run: pnpm turbo test --filter=@engram/api...
